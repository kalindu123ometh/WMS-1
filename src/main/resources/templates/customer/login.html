<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Login – Wedding Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* Reset admin layout styles for this page */
        body {
            display: block !important;
            height: auto !important;
            overflow: auto !important;
            min-height: 100vh;
            background: linear-gradient(135deg, #4A148C 0%, #880E4F 60%, #AD1457 100%) !important;
        }
        .login-card h2 {
            text-align: center;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }
        .login-card p { text-align: center; }
        .field-error { color:#e74c3c; font-size:0.75rem; margin-top:4px; display:none; font-weight:500; }
        .field-error.show { display:block; }
        input.invalid { border-color:#e74c3c !important; background:rgba(231,76,60,0.06) !important; }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card" style="
        max-width: 480px;
        width: 100%;
        border: 3px solid transparent;
        background-clip: padding-box;
        box-shadow:
            0 0 0 3px #AD1457,
            0 0 0 6px #7B1FA2,
            0 0 0 9px rgba(255,64,129,0.2),
            0 30px 70px rgba(0,0,0,0.4);
        border-radius: 16px;
    ">
        <div class="login-logo">💒</div>
        <h2>Customer Login</h2>
        <p>Sign in to manage your wedding bookings</p>

        <!-- Already Logged In Banner -->
        <div th:if="${alreadyLoggedIn}" style="
            background: linear-gradient(135deg, rgba(136,14,79,0.08), rgba(74,20,140,0.08));
            border: 2px solid rgba(136,14,79,0.25);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 18px;
            text-align: center;
        ">
            <div style="font-size:1.8rem; margin-bottom:6px;">👋</div>
            <p style="font-weight:600; color:var(--dark-pink-shine); margin-bottom:4px;"
               th:text="'Welcome back, ' + ${customer.firstName} + '!'">Welcome back!</p>
            <p style="font-size:0.82rem; color:#888; margin-bottom:12px;">You are already logged in.</p>
            <a href="/customer/dashboard" class="btn" style="width:100%; justify-content:center; background:linear-gradient(135deg,#880E4F,#4A148C);">
                🏠 Go to My Dashboard
            </a>
            <div style="margin-top:10px; font-size:0.82rem; color:#aaa; text-align:center;">
                Not you? <a href="/logout" style="color:var(--primary-pink); font-weight:600;">Logout</a> first.
            </div>
        </div>

        <div th:if="${errorMsg}"   class="alert alert-danger"><span>⚠️</span><span th:text="${errorMsg}"></span></div>
        <div th:if="${successMsg}" class="alert alert-success"><span>✅</span><span th:text="${successMsg}"></span></div>

        <form action="/customer/login" method="post" id="custLoginForm" novalidate>
            <div class="form-group" style="margin-bottom:16px;">
                <label>Email Address</label>
                <input type="email" name="email" id="loginEmail" placeholder="your@email.com"
                       oninput="validateEmail()">
                <div class="field-error" id="emailErr">Please enter a valid email address.</div>
            </div>
            <div class="form-group" style="margin-bottom:22px;">
                <label>Password</label>
                <div style="position:relative;">
                    <input type="password" name="password" id="loginPassword" placeholder="Your password"
                           oninput="validateRequired('loginPassword','passwordErr')"
                           style="padding-right:44px;">
                    <button type="button" onclick="togglePw()" tabindex="-1"
                            style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:#aaa;">
                        <span id="pwEye">👁️</span>
                    </button>
                </div>
                <div class="field-error" id="passwordErr">Password is required.</div>
            </div>
            <button type="submit" class="btn" style="width:100%; justify-content:center;">💒 Sign In</button>
        </form>

        <div style="margin-top:16px; text-align:center; font-size:0.88rem; color:#888;">
            No account? <a th:href="@{/customer/register}" style="color:var(--primary-pink); font-weight:700;">Register here</a>
        </div>
        <div style="margin-top:12px; text-align:center;">
            <a href="/" class="btn btn-outline" style="width:100%; justify-content:center;">🏠 Back to Main Page</a>
        </div>
    </div>
</div>
</body>
<script>
const EMAIL_RE = /^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/;
function showErr(id){ document.getElementById(id).classList.add('show'); }
function hideErr(id){ document.getElementById(id).classList.remove('show'); }
function markInvalid(id){ const el=document.getElementById(id); if(el){el.classList.remove('valid');el.classList.add('invalid');} }
function markValid(id)  { const el=document.getElementById(id); if(el){el.classList.remove('invalid');el.classList.add('valid');} }
function validateRequired(inputId,errId){
    const v=document.getElementById(inputId).value.trim();
    if(!v){markInvalid(inputId);showErr(errId);}else{markValid(inputId);hideErr(errId);}
}
function validateEmail(){
    const v=document.getElementById('loginEmail').value.trim();
    if(!v||!EMAIL_RE.test(v)){markInvalid('loginEmail');showErr('emailErr');}else{markValid('loginEmail');hideErr('emailErr');}
}
function togglePw(){
    const inp=document.getElementById('loginPassword'),eye=document.getElementById('pwEye');
    if(inp.type==='password'){inp.type='text';eye.textContent='🙈';}else{inp.type='password';eye.textContent='👁️';}
}
document.getElementById('custLoginForm').addEventListener('submit',function(e){
    let ok=true;
    if(!EMAIL_RE.test(document.getElementById('loginEmail').value.trim())){markInvalid('loginEmail');showErr('emailErr');ok=false;}
    if(!document.getElementById('loginPassword').value){markInvalid('loginPassword');showErr('passwordErr');ok=false;}
    if(!ok)e.preventDefault();
});
</script>
</html>
